# lefthook.yml
# Refer to https://github.com/evilmartians/lefthook/blob/master/docs/configuration.md

pre-commit:
  parallel: true
  commands:
    lint:
      run: pnpm exec oxlint {staged_files}
    fmt:
      run: pnpm exec oxfmt {staged_files}
    solid-tests:
      root: "packages/solid/"
      glob: "**/*.{ts,tsx}"
      run: pnpm run test
      skip:
        - merge
        - rebase
